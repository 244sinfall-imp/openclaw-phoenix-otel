name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        timeout-minutes: 60
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        timeout-minutes: 60
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          allowed_bots: 'claude,claude[bot]'
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}.

            Focus on:
            - Correctness and bugs
            - Security risks
            - Reliability issues
            - Performance problems
            - Missing test coverage

            DO NOT flag:
            - Style, naming, or structural preferences
            - Linting, formatting, or type annotation issues
            - Suggestions that amount to "this could be slightly better"

            If the PR has no issues worth flagging, just say "LGTM" and one sentence of what you reviewed.

            When you do flag something, keep it to 1-2 sentences: state the problem and how to fix it.

            Use full 40-char git SHA when linking to code.

            You may ONLY auto-fix clear bugs with obvious fixes (typos, off-by-one errors, null checks, missing imports).
            For everything else, describe the problem and recommended solution in your review comment.

            REVIEW SUBMISSION:
            After completing your review, submit a formal GitHub review using gh pr review:
            - If you found issues: `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Summary of issues found"`
            - If LGTM: `gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM - brief summary"`
            If gh pr review fails (e.g. permissions), fall back to posting a comment with `gh pr comment` instead.

          claude_args: |
            --model claude-sonnet-4-6
            --allowed-tools "Read,Glob,Grep,Bash(gh pr *),Bash(gh issue *),Bash(gh pr comment *),Bash(gh pr diff *),Bash(gh pr view *),Bash(gh pr review *),Bash(git diff *),Bash(git log *),Bash(git show *),Edit,Write,Bash(git add *),Bash(git commit *),Bash(git push *),WebSearch,WebFetch"
